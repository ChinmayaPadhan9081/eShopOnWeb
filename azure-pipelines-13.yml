trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: CavSecurityPipelineCP100@1
  inputs:
    cavScanServiceConnection: 'cav-scan'
    securityScanApiBaseUrl: 'http://sonar1.cav-test.com:4444'

    applicationType: 'dotnet'

    runStaticScan: false
    staticEngine: 'sonarqube'
    project: 'eShopOnWeb'
    targetPath: ''

    buildCommand: |
      dotnet restore eShopOnWeb.sln
      dotnet build eShopOnWeb.sln --configuration Release --no-restore

    dockerBuildCommand: |
      docker build -t eshoponweb:$(Build.BuildNumber) -f src/Web/Dockerfile .

    containerEngine: 'trivy'
    containerRunMode: 'standalone'
    trivyMode: 'image'
    trivyTarget: 'eshoponweb:$(Build.BuildNumber)'
    trivyReportDir: '$(System.DefaultWorkingDirectory)/trivy-reports'

    imageName: 'eshoponweb:$(Build.BuildNumber)'

    deployCommand: |
      docker rm -f eshoponweb || true
      docker run -d --name eshoponweb -p 3001:8080 eshoponweb:$(Build.BuildNumber)
      sleep 30
      curl -f http://127.0.0.1:3001 || docker logs eshoponweb

    dynamicEngine: 'zap'
    dynamicRunMode: 'standalone'
    zapMode: 'baseline'
    zapTarget: 'http://127.0.0.1:3001'
    zapReportDir: '$(System.DefaultWorkingDirectory)/zap-reports'

    allowInsecureSSL: true