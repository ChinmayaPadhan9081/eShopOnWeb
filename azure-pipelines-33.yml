# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- script: |
    echo Add other tasks to build, test, and deploy your project.
    echo See https://aka.ms/yaml
  displayName: 'Run a multi-line script'

- task: CavSecurityPipelineCP100@1
  inputs:
    cavScanServiceConnection: 'cav-scan'
    securityScanApiBaseUrl: 'https://sonar1.cav-test.com:4444'
    applicationType: 'dotnet'
    staticEngine: 'sonarqube'
    buildCommand: |
      dotnet restore eShopOnWeb.sln
      dotnet build eShopOnWeb.sln --configuration Release --no-restore
    dockerBuildCommand: 'docker build -t eshoponweb:$(Build.BuildNumber) -f src/Web/Dockerfile .'
    containerEngine: 'trivy'
    containerRunMode: 'standalone'
    trivyTarget: 'eshoponweb:$(Build.BuildNumber)'
    dynamicEngine: 'zap'
    dynamicRunMode: 'standalone'
    zapTarget: 'http://127.0.0.1:3001'
    zapReportDir: '$(System.DefaultWorkingDirectory)/zap-reports'
    allowInsecureSSL: true
