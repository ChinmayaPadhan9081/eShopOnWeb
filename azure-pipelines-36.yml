# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'
- checkout: self

- script: |
    docker build -t eshoponweb:$(Build.BuildNumber) -f src/Web/Dockerfile .
  displayName: Build Docker image

- task: CavSecurityPipelineCP100@1
  inputs:
    cavScanServiceConnection: 'cav-scan'
    scanType: 'container'
    containerRunMode: 'standalone'
    trivyMode: 'image'
    trivyTarget: 'eshoponweb:$(Build.BuildNumber)'


