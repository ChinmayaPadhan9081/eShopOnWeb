trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

- task: CavScan@1
  displayName: 'Test Trivy SCA REST Call'
  inputs:
    apiUrl: 'https://demo-cicd.cav-test.com:4444/DashboardServer/v2/web/common/updateSecurityScanLastModified'
    scanType: 'containerization'
    engine: 'trivy'
    runMode: 'standalone'
    allowInsecureSSL: 'true'

- task: CavScan@1
  displayName: 'Test ZAP DAST REST Call'
  inputs:
    apiUrl: 'https://demo-cicd.cav-test.com:4444/DashboardServer/v2/web/common/updateSecurityScanLastModified'
    scanType: 'dynamic'
    engine: 'zap'
    runMode: 'kubernetes'
    allowInsecureSSL: 'true'